name: Deploy Next.js to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build Next.js standalone
        run: npm run build

      - name: Prepare deployment folder
        run: |
          set -e

          rm -rf deploy
          mkdir -p deploy

          # Copy the complete standalone application.
          cp -a .next/standalone/. deploy/

          # Copy static assets into the standalone .next directory.
          mkdir -p deploy/.next
          cp -a .next/static deploy/.next/static

          # Copy public assets when available.
          if [ -d "public" ]; then
            cp -a public deploy/public
          fi

          echo "Deployment package prepared:"
          find deploy -maxdepth 3 -type f | sort | head -200

      - name: Validate deployment package
        run: |
          set -e

          test -f deploy/server.js
          test -f deploy/package.json
          test -d deploy/node_modules
          test -d deploy/.next/server
          test -d deploy/.next/static
          test -f deploy/.next/BUILD_ID

          echo "Next.js standalone deployment package is valid."

      - name: Deploy to cPanel FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./deploy/
          server-dir: /
          dangerous-clean-slate: true