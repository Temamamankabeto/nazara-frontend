name: Deploy Next.js to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build Next.js standalone
        run: npm run build

      - name: Prepare deployment folder
        run: |
          set -e

          rm -rf deploy
          mkdir -p deploy

          # Copy complete standalone application, including hidden .next content.
          cp -a .next/standalone/. deploy/

          # Copy static and public assets.
          mkdir -p deploy/.next
          cp -a .next/static deploy/.next/static

          if [ -d "public" ]; then
            cp -a public deploy/public
          fi

          # Guarantee required runtime packages exist.
          mkdir -p deploy/node_modules

          if [ ! -d "deploy/node_modules/next" ]; then
            cp -a node_modules/next deploy/node_modules/next
          fi

          if [ ! -d "deploy/node_modules/react" ]; then
            cp -a node_modules/react deploy/node_modules/react
          fi

          if [ ! -d "deploy/node_modules/react-dom" ]; then
            cp -a node_modules/react-dom deploy/node_modules/react-dom
          fi

          echo "Deployment package prepared."

      - name: Validate deployment package
        run: |
          set -e

          test -f deploy/server.js
          test -f deploy/package.json
          test -f deploy/.next/BUILD_ID
          test -d deploy/.next/server
          test -d deploy/.next/static
          test -d deploy/node_modules/next
          test -d deploy/node_modules/react
          test -d deploy/node_modules/react-dom

          echo "Standalone deployment package is valid."

      - name: Deploy to cPanel FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./deploy/
          server-dir: /
          dangerous-clean-slate: false